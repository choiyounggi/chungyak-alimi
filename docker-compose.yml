services:
  db:
    image: postgres:16-alpine
    container_name: chungyak-db
    environment:
      POSTGRES_USER: chungyak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: chungyak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chungyak"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
