{% extends "base.html" %}
{% block title %}로그인 · 청약 알리미{% endblock %}

{% block head %}
<style>
  /* 로그인 전용: base body는 중앙정렬이 아니므로 이 페이지에서만 flex center */
  body{min-height:100vh;display:flex;align-items:center;justify-content:center}
  /* base .wrap(max-width:840·pad 22/20/72)을 로그인 박스로 재정의 (brief .box{max-width:380px} 실현) */
  main.wrap{width:100%;max-width:380px;padding:24px 20px}
  /* 브랜드 영역 중앙정렬 + 포인트 teal 타이틀 */
  .login-head{text-align:center;margin-bottom:var(--s-lg)}
  .login-head h1{color:var(--accent-teal)}
  /* 경고 배너: 아이콘+텍스트 정렬(기존 login의 flex 정렬 보존; base .form-error는 display:block) */
  .form-error{display:flex;gap:var(--s-xs);align-items:center}
  /* 제출 버튼 풀폭(base .btn은 inline-flex) */
  form .btn-primary{width:100%;margin-top:var(--s-xxs)}
</style>
{% endblock %}

{% block topbar %}{% endblock %}

{% block content %}
<div class="login-head">
  <h1>청약 알리미</h1>
  <p class="sub">내 관심 청약을 한눈에</p>
</div>
<!-- novalidate: 브라우저 기본 검증 팝업(시스템 알럿) 비활성화 → 서버 인라인 에러로 안내 -->
<form method="post" action="/login" novalidate>
  {% if errors.form %}
  <div class="form-error">
    <svg class="ic" aria-hidden="true"><use href="#i-alert"></use></svg>{{ errors.form }}
  </div>
  {% endif %}
  <div class="field {{ 'has-error' if errors.username else '' }}">
    <label for="username">아이디</label>
    <input id="username" name="username" type="text" autocomplete="username"
           value="{{ username or '' }}" class="{{ 'invalid' if errors.username else '' }}" autofocus>
    <div class="field-error">{{ errors.username or '' }}</div>
  </div>
  <div class="field {{ 'has-error' if errors.password else '' }}">
    <label for="password">비밀번호</label>
    <input id="password" name="password" type="password" autocomplete="current-password"
           class="{{ 'invalid' if errors.password else '' }}">
    <div class="field-error">{{ errors.password or '' }}</div>
  </div>
  <button type="submit" class="btn btn-primary">로그인</button>
</form>
{% endblock %}
