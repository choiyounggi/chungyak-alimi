# 라즈베리파이 자동 배포 (main push → SSH로 pull + 재시작).
# 시크릿(GitHub Actions Secrets): PI_HOST, PI_USER, PI_PORT, PI_SSH_KEY

name: Deploy to Raspberry Pi

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (git pull + restart)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_PORT }}
          script: |
            set -e
            cd ~/chungyak-alimi
            GIT_SSH_COMMAND="ssh -i ~/.ssh/chungyak_deploy" git pull --ff-only
            ./.venv/bin/pip install -q -e .
            sudo systemctl restart chungyak-web.service
