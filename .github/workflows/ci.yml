name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chungyak
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: chungyak
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U chungyak"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://chungyak:changeme@127.0.0.1:5432/chungyak
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Pytest
        run: pytest -q
